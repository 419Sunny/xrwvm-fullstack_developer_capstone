<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
  <title>Dealer Details</title>
  <script>
    const apiRoot = window.location.origin + '/djangoapp';

    function getDealerId() {
      const segments = window.location.pathname.split('/').filter(Boolean);
      return segments[segments.length - 1];
    }

    async function loadDealer() {
      const dealerId = getDealerId();
      const response = await fetch(apiRoot + '/dealer/' + dealerId);
      const data = await response.json();
      const dealer = data.dealer && data.dealer.length ? data.dealer[0] : null;
      if (!dealer) {
        document.getElementById('dealerBody').innerHTML = '<div class="alert alert-warning">Dealer not found.</div>';
        return;
      }
      document.getElementById('dealerName').innerText = dealer.full_name;
      document.getElementById('dealerInfo').innerText = `${dealer.city}, ${dealer.address}, ${dealer.state} ${dealer.zip}`;
      if (sessionStorage.getItem('username')) {
        document.getElementById('postReviewButton').innerHTML = `<a class="btn btn-primary" href="/postreview/${dealerId}">Post Review</a>`;
      }
    }

    async function loadReviews() {
      const dealerId = getDealerId();
      const response = await fetch(apiRoot + '/reviews/dealer/' + dealerId);
      const data = await response.json();
      const reviews = data.reviews || [];
      const container = document.getElementById('reviewsContainer');
      container.innerHTML = '';
      if (!reviews.length) {
        container.innerHTML = '<div class="alert alert-info">No reviews yet for this dealer.</div>';
        return;
      }
      reviews.sort((a, b) => new Date(b.purchase_date || '') - new Date(a.purchase_date || ''));
      reviews.forEach(review => {
        const card = document.createElement('div');
        card.className = 'card mb-3';
        let sentiment = review.sentiment || 'neutral';
        card.innerHTML = `
          <div class="card-body">
            <h5 class="card-title">${review.name}</h5>
            <h6 class="card-subtitle mb-2 text-muted">${review.car_make} ${review.car_model} ${review.car_year}</h6>
            <p class="card-text">${review.review}</p>
            <p class="card-text"><strong>Purchase Date:</strong> ${review.purchase_date}</p>
            <span class="badge bg-${sentiment === 'positive' ? 'success' : sentiment === 'negative' ? 'danger' : 'secondary'}">${sentiment}</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function updateSessionPanel() {
      const panel = document.getElementById('loginPanel');
      const username = sessionStorage.getItem('username');
      if (username) {
        panel.innerHTML = `<span class="me-3">Welcome, ${username}</span><a class="btn btn-outline-light btn-sm" href="#" onclick="logout(event)">Logout</a>`;
      } else {
        panel.innerHTML = `<a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a><a class="btn btn-outline-light btn-sm" href="/register">Register</a>`;
      }
    }

    async function logout(event) {
      event.preventDefault();
      await fetch('/djangoapp/logout');
      sessionStorage.clear();
      window.location.reload();
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateSessionPanel();
      loadDealer();
      loadReviews();
    });
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
        <div id="loginPanel"></div>
      </div>
    </div>
  </nav>
  <div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div>
        <h1 id="dealerName">Dealer Details</h1>
        <p id="dealerInfo"></p>
      </div>
      <div id="postReviewButton"></div>
    </div>
    <div id="reviewsContainer"></div>
  </div>
</body>
</html>
