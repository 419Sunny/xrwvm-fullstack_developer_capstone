<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
  <title>Post Review</title>
  <script>
    const apiRoot = window.location.origin + '/djangoapp';

    function getDealerId() {
      const segments = window.location.pathname.split('/').filter(Boolean);
      return segments[segments.length - 1];
    }

    async function updateDealerInfo() {
      const dealerId = getDealerId();
      const response = await fetch(apiRoot + '/dealer/' + dealerId);
      const data = await response.json();
      const dealer = data.dealer && data.dealer.length ? data.dealer[0] : null;
      document.getElementById('dealerName').innerText = dealer ? dealer.full_name : 'Unknown Dealer';
    }

    async function loadCarModels() {
      const response = await fetch(apiRoot + '/get_cars');
      const data = await response.json();
      const cars = data.CarModels || [];
      const select = document.getElementById('carModel');
      select.innerHTML = '<option value="" disabled selected>Choose make and model</option>' + cars.map(car => `<option value="${car.CarMake}||${car.CarModel}">${car.CarMake} ${car.CarModel}</option>`).join('');
    }

    async function postReview(event) {
      event.preventDefault();
      const reviewer = sessionStorage.getItem('username');
      if (!reviewer) {
        window.location.href = '/login';
        return;
      }
      const firstName = sessionStorage.getItem('firstname') || '';
      const lastName = sessionStorage.getItem('lastname') || '';
      const name = firstName && lastName ? `${firstName} ${lastName}` : reviewer;
      const carValue = document.getElementById('carModel').value;
      if (!carValue) {
        alert('Choose a car make and model.');
        return;
      }
      const [carMake, carModel] = carValue.split('||');
      const payload = {
        name: name,
        dealership: parseInt(getDealerId()),
        review: document.getElementById('reviewText').value,
        purchase: true,
        purchase_date: document.getElementById('purchaseDate').value,
        car_make: carMake,
        car_model: carModel,
        car_year: parseInt(document.getElementById('carYear').value),
      };
      const response = await fetch(apiRoot + '/add_review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (data.status === 200) {
        window.location.href = '/dealer/' + payload.dealership;
      } else {
        alert('Unable to post review.');
      }
    }

    function updateSessionPanel() {
      const panel = document.getElementById('loginPanel');
      const username = sessionStorage.getItem('username');
      if (username) {
        panel.innerHTML = `<span class="me-3">${username}</span><a class="btn btn-outline-light btn-sm" href="#" onclick="logout(event)">Logout</a>`;
      } else {
        panel.innerHTML = `<a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a><a class="btn btn-outline-light btn-sm" href="/register">Register</a>`;
      }
    }

    async function logout(event) {
      event.preventDefault();
      await fetch('/djangoapp/logout');
      sessionStorage.clear();
      window.location.href = '/login';
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateSessionPanel();
      updateDealerInfo();
      loadCarModels();
    });
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
        <div id="loginPanel"></div>
      </div>
    </div>
  </nav>
  <div class="container mt-5" style="max-width: 720px;">
    <h1>Post a Review</h1>
    <p>Share your experience with the dealer and help other customers make informed choices.</p>
    <form onsubmit="postReview(event)">
      <div class="mb-3">
        <label class="form-label">Review</label>
        <textarea id="reviewText" class="form-control" rows="6" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label">Purchase Date</label>
        <input id="purchaseDate" class="form-control" type="date" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Car Make and Model</label>
        <select id="carModel" class="form-select" required></select>
      </div>
      <div class="mb-3">
        <label class="form-label">Car Year</label>
        <input id="carYear" class="form-control" type="number" min="2015" max="2025" required />
      </div>
      <button class="btn btn-primary" type="submit">Post Review</button>
    </form>
  </div>
</body>
</html>
