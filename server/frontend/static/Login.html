<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
  <title>Login</title>
  <script>
    async function login(event) {
      event.preventDefault();
      const payload = {
        userName: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value,
      };
      const response = await fetch('/djangoapp/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (data.status === 'Authenticated') {
        sessionStorage.setItem('username', data.userName);
        sessionStorage.setItem('firstname', data.first_name || '');
        sessionStorage.setItem('lastname', data.last_name || '');
        window.location.href = '/dealers';
      } else {
        alert('Login failed. Please check your credentials.');
      }
    }
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-5" style="max-width: 520px;">
    <h1>Login</h1>
    <form onsubmit="login(event)">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input id="username" class="form-control" type="text" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input id="password" class="form-control" type="password" required />
      </div>
      <button class="btn btn-primary" type="submit">Login</button>
      <a class="btn btn-link" href="/register">Register Now</a>
    </form>
  </div>
</body>
</html>
