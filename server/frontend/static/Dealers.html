<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="/static/style.css">
  <title>Dealerships</title>
  <script>
    const apiRoot = window.location.origin + '/djangoapp';

    async function loadDealers(state = '') {
      const statePath = state ? '/' + encodeURIComponent(state) : '';
      const response = await fetch(apiRoot + '/get_dealers' + statePath);
      const data = await response.json();
      const dealers = data.dealers || [];
      renderDealers(dealers);
      populateStates(dealers);
    }

    function getCurrentUser() {
      return sessionStorage.getItem('username');
    }

    function renderDealers(dealers) {
      const tbody = document.getElementById('dealersTableBody');
      tbody.innerHTML = '';
      if (!dealers.length) {
        tbody.innerHTML = '<tr><td colspan="6">No dealerships found.</td></tr>';
        return;
      }
      const isLoggedIn = Boolean(getCurrentUser());
      document.getElementById('reviewHeader').style.display = isLoggedIn ? '' : 'none';
      dealers.forEach(dealer => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${dealer.id}</td>
          <td><a href="/dealer/${dealer.id}">${dealer.full_name}</a></td>
          <td>${dealer.city}</td>
          <td>${dealer.address}</td>
          <td>${dealer.zip}</td>
          <td>${dealer.state}</td>
          <td ${isLoggedIn ? '' : 'style="display:none"'}><a class="btn btn-sm btn-primary" href="/postreview/${dealer.id}">Review</a></td>
        `;
        tbody.appendChild(row);
      });
    }

    function populateStates(dealers) {
      const dropdown = document.getElementById('stateSelect');
      const states = Array.from(new Set(dealers.map(d => d.state))).sort();
      dropdown.innerHTML = '<option value="">Show all</option>' + states.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function handleStateFilter() {
      const state = document.getElementById('stateSelect').value;
      loadDealers(state);
    }

    function updateSessionPanel() {
      const panel = document.getElementById('loginPanel');
      const username = getCurrentUser();
      if (username) {
        panel.innerHTML = `<span class="me-3">Hello, ${username}</span><a class="btn btn-outline-light btn-sm" href="#" onclick="logout(event)">Logout</a>`;
      } else {
        panel.innerHTML = `<a class="btn btn-outline-light btn-sm me-2" href="/login">Login</a><a class="btn btn-outline-light btn-sm" href="/register">Register</a>`;
      }
    }

    async function logout(event) {
      event.preventDefault();
      const response = await fetch('/djangoapp/logout');
      const data = await response.json();
      sessionStorage.removeItem('username');
      sessionStorage.removeItem('firstname');
      sessionStorage.removeItem('lastname');
      if (data.status === 'Success') {
        window.location.reload();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      updateSessionPanel();
      loadDealers();
    });
  </script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
    <div class="container-fluid">
      <h2 style="padding-right: 5%;">Dealerships</h2>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarText">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/about">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="/contact">Contact Us</a></li>
        </ul>
        <div id="loginPanel"></div>
      </div>
    </div>
  </nav>
  <div class="container mt-5">
    <div class="row mb-4">
      <div class="col-md-6">
        <h1>Dealer Directory</h1>
        <p>Browse all local dealerships or filter by state to find the nearest branch.</p>
      </div>
      <div class="col-md-6 text-end">
        <label for="stateSelect" class="form-label">Filter by state</label>
        <select id="stateSelect" class="form-select" onchange="handleStateFilter()"></select>
      </div>
    </div>
    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>City</th>
            <th>Address</th>
            <th>Zip</th>
            <th>State</th>
            <th id="reviewHeader">Review Dealer</th>
          </tr>
        </thead>
        <tbody id="dealersTableBody"></tbody>
      </table>
    </div>
  </div>
</body>
</html>
